<div class="accesos-page">

    <button class="inicio-bank-action" onclick="cargarVista('organizacion')">

    <button class="inicio-bank-action" onclick="cargarVista('documentos')">

        <i class="fa-solid fa-file-arrow-up"></i>

    <button class="inicio-bank-action" onclick="cargarVista('contacto')">
